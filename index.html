<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Interest Rate Calculator</title>
    <meta
      name="description"
      content="Interest Rate Calculator to compute simple interest quickly and accurately for loans and savings."
    />

    <!-- Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Interest Rate Calculator</h1>

      <div class="form-group">
        <label for="principal">Principal Amount</label>
        <input type="number" id="principal" placeholder="e.g. 1000" />
      </div>

      <div class="form-group">
        <label for="rate">Annual Interest Rate (%)</label>
        <input type="number" id="rate" placeholder="e.g. 5" />
      </div>

      <div class="form-group">
        <label for="time">Time (years)</label>
        <input type="number" id="time" placeholder="e.g. 2" />
      </div>

      <button id="calculateBtn">Calculate</button>

      <div class="result" id="result"></div>
    </div>

    <!-- JavaScript (Webpack bundle) -->
    <script src="dist/bundle.js"></script>
  </body>
</html>
